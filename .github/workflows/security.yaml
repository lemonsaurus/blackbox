name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan catches CVEs published after the last PR.
    - cron: '23 6 * * 1'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # Audit only the runtime graph: users `pip install blackbox-cli`
      # and don't get pytest/ruff/etc.
      - name: Export runtime dependencies
        run: uv export --frozen --no-dev --format requirements-txt --no-hashes -o runtime-deps.txt

      - name: Run pip-audit
        run: uv run pip-audit -r runtime-deps.txt --no-deps --disable-pip
