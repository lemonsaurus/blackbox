name: Release to PyPI

on:
  release:
    types: [published]

jobs:
  release:
    name: Bump version, build, and publish
    runs-on: ubuntu-latest
    environment: pypi

    # `id-token: write` lets the publish step mint the OIDC token PyPI
    # trusts for this repo + workflow + environment. `contents: write`
    # is for the auto-commit that pushes the version bump back to main.
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          ref: main
          ssh-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Bump the version
        run: |
          # Strip any leading 'v' from the tag (PEP 440 doesn't allow it).
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          uv version "$VERSION"

      - name: Build distributions
        run: uv build

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: pyproject.toml uv.lock
          commit_message: "Bump version to ${{ github.event.release.tag_name }} [skip ci]"

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  build-and-push-on-release:
    name: Build and push to DockerHub
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse version tags
        id: version_tags
        run: |
          TAG_NAME=${{ github.event.release.tag_name }}
          VERSION=${TAG_NAME#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          echo "full_version=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "major_minor=v${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "major=v${MAJOR}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          cache-from: type=registry,ref=lemonsaurus/blackbox:latest
          cache-to: type=inline
          tags: |
            lemonsaurus/blackbox:latest
            lemonsaurus/blackbox:${{ steps.version_tags.outputs.full_version }}
            lemonsaurus/blackbox:${{ steps.version_tags.outputs.major_minor }}
            lemonsaurus/blackbox:${{ steps.version_tags.outputs.major }}
